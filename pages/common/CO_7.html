<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=Edge; chrome=1" />
<meta http-equiv="Expires" content="-1" />
<meta http-equiv="Pragma" content="no-cache" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1, user-scalable=0, viewport-fit=cover">

   <title>0한동</title>
   <link rel="stylesheet" href="../../css/common.css">
<link rel="stylesheet" href="../../css/components.css">
</head>
<body>
    <div id="document" class="wrapper">
        <div class="full-popup guardian-certification">
            <div class="full-popup__header">
                <h2 class="full-popup__title">보호자 인증안내</h2>
                <p class="full-popup__sub-title">14세 미만 고객님은 서비스 이용을 위해 보호자 (법정대리인)의 동의가 필요합니다.</p>
            </div>
            <div class="full-popup__contents">
                <div class="guardian-certification__box">
                    <div class="guardian-certification__title">보호자 전화번호 입력</div>
                    <div class="guardian-certification__select">
                        <select id="" class="class-num">
                            <option value="0">통신사 선택</option>
                            <option value="1">SKT</option>
                            <option value="2">KT</option>
                            <option value="3">LG</option>
                            <option value="3">알뜰폰</option>
                        </select>
                    </div>
                    <div class="guardian-certification__input-area">
                        <input type="number" placeholder="휴대폰 번호 입력" title="휴대폰 번호 입력">
                        <button type="button">인증</button>
                    </div>
                    <!-- 비활성화 -->
                    <div class="guardian-certification__input-area disabled">
                        <input type="number" placeholder="인증번호 입력(3분 이내)" title="인증번호 입력" disabled>
                        <button type="button" disabled>확인</button>
                    </div>
                    <!-- 활성화 -->
                    <!-- <div class="guardian-certification__input-area">
                        <input type="number" placeholder="인증번호 입력(3분 이내)">
                        <button type="button">확인</button>
                    </div> -->
                    <div class="guardian-certification__info">
                        <p class="guardian-certification__text">법인회선 혹은 알뜰폰을 사용하신다면 우측 도움말 버튼을 눌러 내용을 확인하세요.</p>
                        <a href="#" class="guardian-certification__anchor" aria-label="법인 회선 및 알뜰폰 안내"></a>
                    </div>
                    <div class="guardian-certification__button-area">
                        <button type="button" class="guardian-certification__button">이용약관</button>
                        <button type="button" class="guardian-certification__button">개인정보 처리방침</button>
                    </div>
                    <div class="signup-content check">
                        <div class="tit2">가입 사실 확인 및 동의</div>
                        <div class="text-field">
                            <div class="checkbox-field">
                                <div class="checkbox-group first">
                                    <span class="checkbox-text">
                                        <button type="button">위 사용자의 가입 사실을 확인하고 가입에 동의합니다. (필수)</button>
                                    </span>
                                    <input type="checkbox" id="check1" class="input-check" disabled="">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="signup-content certification complete">
                        <!-- 비활성화 -->
                        <a href="#a" class="btn__square btn--full gray">다음</a>
                        <!-- 활성화 -->
                        <!-- <a href="#a" class="btn__square btn--full blue">다음</a> -->
                    </div>
                </div>
            </div>
            <div class="full-popup__close">
                <a href="#"><span class="hidden">팝업 닫기</span></a>
            </div>
        </div>
        <!-- top버튼 -->
        <div class="top-button">
  <button type="button" class="top-button__anchor" aria-label="화면 상단으로 이동"></button>
</div>
        <!-- // top버튼 -->
    </div>
</body>
<!-- lib js -->
<script src="../../js/lib/jquery_3.6.0.js" type="text/javascript"></script>
<script src="../../js/lib/swiper-7.4.1.min.js" type="text/javascript"></script>
<script src="../../js/lib/pualugin.js" type="text/javascript"></script>
<script src="../../js/lib/jquery-barcode.js" type="text/javascript"></script>
<!-- js -->
<script src="../../js/common.js" type="text/javascript"></script>

</html>
